version: 2

models:
  - name: agent_player_search
    description: Searchable and answer-ready player context table for the Ask NBA Stats agent.
    columns:
      - name: player_id
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: player_name
        tests: [not_null]
      - name: latest_season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: latest_team_abbr
        tests: [not_null]
      - name: games_sampled
        tests: [not_null]
      - name: is_qualified
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true]
                quote: false
      - name: sample_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ready', 'limited_sample']
      - name: search_text
        tests: [not_null]
      - name: answer_context
        tests: [not_null]
